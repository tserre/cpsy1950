<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect width="900" height="420" rx="12" fill="#1E293B"/>

  <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#E0E7FF">Neural Recording Methods: Tradeoffs</text>

  <!-- Axes -->
  <line x1="100" y1="60" x2="100" y2="370" stroke="#64748B" stroke-width="2"/>
  <line x1="100" y1="370" x2="850" y2="370" stroke="#64748B" stroke-width="2"/>

  <!-- Y axis: Spatial Resolution -->
  <text x="40" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#CBD5E1" transform="rotate(-90 40 215)">Spatial Resolution</text>
  <text x="85" y="85" text-anchor="end" font-family="Arial" font-size="9" fill="#94A3B8">Single neuron</text>
  <text x="85" y="155" text-anchor="end" font-family="Arial" font-size="9" fill="#94A3B8">~100 μm</text>
  <text x="85" y="250" text-anchor="end" font-family="Arial" font-size="9" fill="#94A3B8">~1 mm</text>
  <text x="85" y="360" text-anchor="end" font-family="Arial" font-size="9" fill="#94A3B8">~1 cm</text>

  <!-- X axis: Temporal Resolution -->
  <text x="475" y="405" text-anchor="middle" font-family="Arial" font-size="12" fill="#CBD5E1">Temporal Resolution</text>
  <text x="150" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#94A3B8">seconds</text>
  <text x="350" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#94A3B8">~100ms</text>
  <text x="600" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#94A3B8">~10ms</text>
  <text x="800" y="390" text-anchor="middle" font-family="Arial" font-size="9" fill="#94A3B8">~1ms</text>

  <!-- fMRI bubble -->
  <circle cx="170" cy="260" r="45" fill="#4F46E5" opacity="0.7" stroke="#6366F1" stroke-width="2"/>
  <text x="170" y="255" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">fMRI</text>
  <text x="170" y="272" text-anchor="middle" font-family="Arial" font-size="9" fill="#E0E7FF">whole-brain</text>

  <!-- EEG bubble -->
  <circle cx="620" cy="340" r="40" fill="#F59E0B" opacity="0.7" stroke="#FBBF24" stroke-width="2"/>
  <text x="620" y="335" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">EEG</text>
  <text x="620" y="352" text-anchor="middle" font-family="Arial" font-size="9" fill="#FEF3C7">non-invasive</text>

  <!-- MEG bubble -->
  <circle cx="600" cy="290" r="35" fill="#D97706" opacity="0.7" stroke="#FBBF24" stroke-width="2"/>
  <text x="600" y="285" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">MEG</text>
  <text x="600" y="300" text-anchor="middle" font-family="Arial" font-size="9" fill="#FEF3C7">non-invasive</text>

  <!-- ECoG bubble -->
  <circle cx="550" cy="200" r="35" fill="#16A34A" opacity="0.7" stroke="#4ADE80" stroke-width="2"/>
  <text x="550" y="195" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">ECoG</text>
  <text x="550" y="210" text-anchor="middle" font-family="Arial" font-size="9" fill="#DCFCE7">rare</text>

  <!-- Ephys bubble -->
  <circle cx="760" cy="90" r="38" fill="#DC2626" opacity="0.7" stroke="#F87171" stroke-width="2"/>
  <text x="760" y="82" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Single-</text>
  <text x="760" y="96" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">unit</text>
  <text x="760" y="112" text-anchor="middle" font-family="Arial" font-size="9" fill="#FEE2E2">invasive</text>

  <!-- Two-photon bubble -->
  <circle cx="350" cy="120" r="38" fill="#7C3AED" opacity="0.7" stroke="#A78BFA" stroke-width="2"/>
  <text x="350" y="112" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">2-photon</text>
  <text x="350" y="128" text-anchor="middle" font-family="Arial" font-size="9" fill="#EDE9FE">optical</text>

  <!-- Neuropixels bubble -->
  <circle cx="720" cy="140" r="42" fill="#EC4899" opacity="0.7" stroke="#F472B6" stroke-width="2"/>
  <text x="720" y="130" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">Neuro-</text>
  <text x="720" y="145" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">pixels</text>
  <text x="720" y="162" text-anchor="middle" font-family="Arial" font-size="9" fill="#FCE7F3">1000s neurons</text>

  <!-- Ideal corner annotation -->
  <text x="820" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#4ADE80">★ ideal</text>
</svg>