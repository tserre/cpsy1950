<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <rect width="900" height="360" rx="12" fill="#1E293B"/>

  <!-- Y axis -->
  <line x1="100" y1="40" x2="100" y2="290" stroke="#64748B" stroke-width="2"/>
  <text x="50" y="170" text-anchor="middle" font-family="Arial" font-size="12" fill="#CBD5E1" transform="rotate(-90 50 170)">Prediction Accuracy (R²)</text>

  <!-- X axis labels -->
  <text x="450" y="320" text-anchor="middle" font-family="Arial" font-size="12" fill="#CBD5E1">Models</text>

  <!-- Noise ceiling band -->
  <rect x="100" y="60" width="700" height="35" rx="0" fill="#16A34A" opacity="0.15"/>
  <line x1="100" y1="60" x2="800" y2="60" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="810" y="65" font-family="Arial" font-size="11" font-weight="bold" fill="#4ADE80">Upper NC</text>
  <line x1="100" y1="95" x2="800" y2="95" stroke="#16A34A" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="810" y="100" font-family="Arial" font-size="11" fill="#4ADE80">Lower NC</text>

  <!-- Noise region label -->
  <text x="855" y="45" font-family="Arial" font-size="10" fill="#94A3B8">Noise in</text>
  <text x="855" y="57" font-family="Arial" font-size="10" fill="#94A3B8">data</text>
  <line x1="840" y1="42" x2="840" y2="60" stroke="#94A3B8" stroke-width="1"/>
  <line x1="836" y1="42" x2="844" y2="42" stroke="#94A3B8" stroke-width="1"/>
  <line x1="836" y1="60" x2="844" y2="60" stroke="#94A3B8" stroke-width="1"/>

  <!-- Y axis ticks -->
  <text x="90" y="64" text-anchor="end" font-family="Arial" font-size="10" fill="#94A3B8">0.40</text>
  <text x="90" y="99" text-anchor="end" font-family="Arial" font-size="10" fill="#94A3B8">0.35</text>
  <text x="90" y="170" text-anchor="end" font-family="Arial" font-size="10" fill="#94A3B8">0.25</text>
  <text x="90" y="240" text-anchor="end" font-family="Arial" font-size="10" fill="#94A3B8">0.15</text>
  <text x="90" y="290" text-anchor="end" font-family="Arial" font-size="10" fill="#94A3B8">0.05</text>

  <!-- Grid lines -->
  <line x1="100" y1="170" x2="800" y2="170" stroke="#334155" stroke-width="0.5"/>
  <line x1="100" y1="240" x2="800" y2="240" stroke="#334155" stroke-width="0.5"/>

  <!-- Model bars -->
  <!-- Model A: good -->
  <rect x="170" y="105" width="60" height="185" rx="4" fill="#4F46E5"/>
  <text x="200" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#CBD5E1">Model A</text>
  <text x="200" y="125" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">0.33</text>

  <!-- Model B: decent -->
  <rect x="290" y="155" width="60" height="135" rx="4" fill="#6366F1"/>
  <text x="320" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#CBD5E1">Model B</text>
  <text x="320" y="175" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">0.26</text>

  <!-- Model C: meh -->
  <rect x="410" y="200" width="60" height="90" rx="4" fill="#818CF8"/>
  <text x="440" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#CBD5E1">Model C</text>
  <text x="440" y="220" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">0.20</text>

  <!-- Model D: bad -->
  <rect x="530" y="250" width="60" height="40" rx="4" fill="#A5B4FC"/>
  <text x="560" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#CBD5E1">Model D</text>
  <text x="560" y="270" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1E293B">0.10</text>

  <!-- Pixels baseline -->
  <rect x="650" y="270" width="60" height="20" rx="4" fill="#475569"/>
  <text x="680" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#CBD5E1">Pixels</text>
  <text x="680" y="265" text-anchor="middle" font-family="Arial" font-size="10" fill="#94A3B8">0.06</text>

  <!-- Annotation: Model A as % of noise ceiling -->
  <line x1="235" y1="78" x2="235" y2="105" stroke="#FCD34D" stroke-width="2"/>
  <line x1="231" y1="78" x2="239" y2="78" stroke="#FCD34D" stroke-width="2"/>
  <line x1="231" y1="105" x2="239" y2="105" stroke="#FCD34D" stroke-width="2"/>
  <rect x="240" y="78" width="120" height="24" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="300" y="94" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#92400E">86% of ceiling!</text>

  <!-- Bottom legend -->
  <text x="450" y="345" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#CBD5E1">Without noise ceiling: R²=0.33 looks bad. With it: 86% of explainable variance!</text>
</svg>