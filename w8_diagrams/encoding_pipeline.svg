<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" width="900" height="340">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  <rect width="900" height="340" rx="12" fill="#1E293B"/>

  <!-- Step 1: Stimuli -->
  <rect x="30" y="60" width="120" height="100" rx="10" fill="url(#bg1)" stroke="#4F46E5" stroke-width="2"/>
  <text x="90" y="100" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1E293B">Stimuli</text>
  <text x="90" y="120" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">(images, audio,</text>
  <text x="90" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">sentences)</text>

  <!-- Arrow 1 -->
  <line x1="155" y1="110" x2="185" y2="110" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: DNN -->
  <rect x="190" y="40" width="140" height="140" rx="10" fill="#312E81" stroke="#6366F1" stroke-width="2"/>
  <text x="260" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#E0E7FF">DNN Model</text>
  <!-- Layer blocks -->
  <rect x="210" y="88" width="100" height="16" rx="4" fill="#4F46E5" opacity="0.5"/>
  <text x="260" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#E0E7FF">Layer 1</text>
  <rect x="210" y="108" width="100" height="16" rx="4" fill="#4F46E5" opacity="0.7"/>
  <text x="260" y="120" text-anchor="middle" font-family="Arial" font-size="9" fill="#E0E7FF">Layer L ★</text>
  <rect x="210" y="128" width="100" height="16" rx="4" fill="#4F46E5" opacity="0.5"/>
  <text x="260" y="140" text-anchor="middle" font-family="Arial" font-size="9" fill="#E0E7FF">Layer N</text>
  <text x="260" y="165" text-anchor="middle" font-family="Arial" font-size="10" fill="#A5B4FC">extract features</text>

  <!-- Arrow 2 -->
  <line x1="335" y1="110" x2="365" y2="110" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Features -->
  <rect x="370" y="60" width="120" height="100" rx="10" fill="url(#bg1)" stroke="#4F46E5" stroke-width="2"/>
  <text x="430" y="95" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1E293B">Feature</text>
  <text x="430" y="112" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#1E293B">Matrix</text>
  <text x="430" y="135" text-anchor="middle" font-family="Arial" font-size="11" fill="#475569">n_stim × n_units</text>

  <!-- Arrow 3 -->
  <line x1="495" y1="110" x2="525" y2="110" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Linear Mapping -->
  <rect x="530" y="50" width="130" height="120" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="595" y="85" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#92400E">Linear</text>
  <text x="595" y="102" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#92400E">Regression</text>
  <text x="595" y="125" text-anchor="middle" font-family="Arial" font-size="11" fill="#92400E">ŷ = Wx + b</text>
  <text x="595" y="145" text-anchor="middle" font-family="Arial" font-size="10" fill="#B45309">fit on train set</text>

  <!-- Arrow 4 -->
  <line x1="665" y1="110" x2="695" y2="110" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 5: Predicted vs Actual -->
  <rect x="700" y="40" width="170" height="140" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="785" y="70" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#166534">Evaluate</text>
  <text x="785" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#166534">on held-out data</text>
  <text x="785" y="120" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#16A34A">R²</text>
  <text x="785" y="145" text-anchor="middle" font-family="Arial" font-size="11" fill="#166534">predicted vs. actual</text>
  <text x="785" y="162" text-anchor="middle" font-family="Arial" font-size="11" fill="#166534">neural response</text>

  <!-- Brain icon (simplified) at bottom -->
  <text x="595" y="220" text-anchor="middle" font-family="Arial" font-size="12" fill="#94A3B8">Brain recordings (fMRI / ephys / EEG)</text>
  <line x1="595" y1="228" x2="595" y2="168" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="620" y="195" font-family="Arial" font-size="10" fill="#94A3B8">target y</text>

  <!-- Bottom label -->
  <text x="450" y="280" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#CBD5E1">Encoding Model Pipeline</text>
  <text x="450" y="300" text-anchor="middle" font-family="Arial" font-size="11" fill="#64748B">Can we predict brain activity from model features?</text>
  <text x="450" y="320" text-anchor="middle" font-family="Arial" font-size="10" fill="#475569">Higher R² → better alignment between model and brain region</text>
</svg>