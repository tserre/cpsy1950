  - date: "2026-03-12"
    topic: "Lightning Mini-Conf 6: Neural Alignment"
    type: "lightning"
    description: "Student lightning talks on model-to-brain mapping"
    published: true
    finalized: false
    internal_notes: |
      Consider for lightning talks (AI–brain alignment week):
      1. Chen et al. (2025) — "Language modulates vision in human perception" (Nature Human Behaviour). Most directly relevant: CLIP-style vision–language models explain human ventral visual cortex (VOTC) better than vision-only models (ResNet, MoCo). Lesion data: stroke patients with damaged white matter between VOTC and left angular gyrus show decreased CLIP–brain alignment and increased MoCo–brain alignment. Causal demonstration that language actively shapes visual representations in the human brain, not just in models. Published December 2025.
      2. Doerig, Kietzmann et al. (2025) — "High-level visual representations in the human brain are aligned with large language models" (Nature Machine Intelligence). LLM embeddings of scene captions predict brain activity to natural scenes; works because LLMs integrate compositional scene information (object relations, spatial layout) that simpler visual features miss. Key insight: language-based representations capture aspects of visual processing that vision-only models don't — suggesting the brain's visual system may encode something closer to a linguistic description than a pixel-level feature map.
  
