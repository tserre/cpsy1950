    type: "lecture"
    description: "Pretraining and fine-tuning/transfer; in-context learning and reasoning; what 'emergence' claims mean and how to evaluate them critically"
    published: true
    finalized: true
    internal_notes: |
      Good background reading for W4 (also W8): Firestone, 'Performance vs. competence in human–machine comparisons' (PNAS 2020) https://www-pnas-org.revproxy.brown.edu/doi/10.1073/pnas.1905334117
      Cover in lecture: Huh et al. (2024) — "The Platonic Representation Hypothesis" (ICML 2024, Oral).

      W4 End Reflection (8–10 min): Bitter Lesson → testable predictions
      • Pair up (or solo). Submit 4 short bullets:
        1. One Sutton-style prediction (AI, 2026–2030) about what will drive gains (compute/data/objectives/architecture).
        2. One prediction for multimodal models (what scales? what breaks? where does grounding help/hurt?).
        3. One falsifier: what concrete result would make you revise your prediction?
        4. One "exception/limit" where inductive bias / structure / priors likely win (small data, causality, safety, neuroscience plausibility, etc.).
      • Optional framing prompt (1 sentence): "Does W4 evidence support 'scale beats priors,' or does it look like 'scale + the right bias'?"
      • Quick synthesis (2–3 min): Live poll: Scale-first / Priors-first / Hybrid + 1–2 volunteers share their falsifier.
      • Low-stakes grading rubric (completion): 4 bullets present, at least one is operationalized (names a measurable outcome or specific comparison).
      • Nice tie-in to course themes: "What counts as evidence vs claim?" + "performance vs competence?" + "Marr levels: implementation (compute) vs algorithm (objective) vs representation (multimodal)."
  
