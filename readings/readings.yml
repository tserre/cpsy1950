# CPSY 1950 Reading Lists - INTERNAL VERSION
# This file contains your planning notes, alternatives, and drafts.
# The sync script will filter this to show only "published: true" items to students.
# Items without "published" field or with "published: false" will show as TBD on website.

readings:
  # Week 2 - Bootcamp (PUBLISHED - Restructured for Spring 2026)
  - week: 2
    topic: "Foundations of Natural and Artificial Intelligence"
    description: "Async bootcamp: Required core + conditional tracks + checkpoint reading"
    published: true

    required_core:
      - title: "Marr's Levels of Analysis (video)"
        authors: "Nancy Kanwisher"
        type: video
        notes: "Required for all students. ~90 min total for required core."
        published: true

      - title: "MIT OCW 9.13 Lecture 2: Neuroanatomy"
        type: video
        notes: "Required for all. Focus on gross organization, receptive fields, neural tuning, cortical maps."
        published: true

    conditional_tracks:
      - track: "A"
        title: "Cognitive neuroscience foundations"
        condition: "Complete if you have not taken at least 1-2 courses in neuroscience or cognitive neuroscience"
        target_time: "~180 min"
        items:
          - "A1) BrainFacts: How neurons communicate"
          - "A2) NIH/NINDS: Brain basics — know your brain"
          - "A3) MIT OCW 9.13 Lectures 4 & 5 (Cognitive neuroscience methods I & II)"
          - "A4) Optional: BrainFacts cheat-sheets on measuring neural physiology"
        published: true

      - track: "B"
        title: "Linear algebra intuition (refresher)"
        condition: "Complete if vectors/matrices feel rusty"
        target_time: "~60 min"
        items:
          - title: "Vectors, what even are they?"
            url: "https://www.3blue1brown.com/lessons/vectors"
          - title: "Linear combinations, span, and basis vectors"
            url: "https://www.3blue1brown.com/lessons/span"
          - title: "Linear transformations and matrices"
            url: "https://www.3blue1brown.com/lessons/linear-transformations"
          - title: "Matrix multiplication as composition"
            url: "https://www.3blue1brown.com/lessons/matrix-multiplication"
        published: true

      - track: "C"
        title: "Deep learning intuition (refresher)"
        condition: "Complete if backprop/gradient descent are unfamiliar"
        target_time: "~60 min"
        items:
          - title: "What is a neural network?"
            url: "https://www.3blue1brown.com/lessons/neural-networks"
          - title: "Gradient descent"
            url: "https://www.3blue1brown.com/lessons/gradient-descent"
          - title: "Backpropagation"
            url: "https://www.youtube.com/watch?v=Ilg3gGewQ5U"
        published: true

    checkpoint:
      - title: "The recent excitement about neural networks"
        authors: "Crick, F."
        journal: "Nature"
        year: 1989
        notes: "Bootcamp checkpoint reading. Response due Sun 2/2, 2:00pm on Canvas."
        required: true
        published: true

    optional_background:
      - title: "Deep Neural Networks as Scientific Models"
        authors: "Cichy, R. M., & Kaiser, D."
        journal: "Trends in Cognitive Sciences"
        year: 2019
        url: "https://www-cell-com.revproxy.brown.edu/trends/cognitive-sciences/fulltext/S1364-6613%2819%2930034-8"
        notes: "Optional background paper"
        published: true

      - title: "The neuroconnectionist research programme"
        authors: "Doerig, A., Sommers, R. P., Seeliger, K., et al."
        journal: "Nature Reviews Neuroscience"
        year: 2023
        url: "https://www-nature-com.revproxy.brown.edu/articles/s41583-023-00705-w"
        pdf: "https://arxiv.org/pdf/2209.03718"
        notes: "Optional background paper"
        published: true

